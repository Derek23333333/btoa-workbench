<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B端思维·进阶工作台</title>
<style>
:root{--bg:#1a0b2e;--card:#2d1b4e;--text:#e4d7f5;--text-secondary:#b8a5d4;--accent:#c084fc;--accent-bright:#a855f7;--gold:#d4a574;--card-border:rgba(196,132,252,0.15);--gradient-btn:linear-gradient(135deg,#7c3aed,#a855f7);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,0.15) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(168,85,247,0.08) 0%,transparent 50%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;text-align:center;padding:40px 20px}
h1{font-size:36px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.subtitle{font-size:15px;color:var(--text-secondary);margin-bottom:40px}
.enter-btn{display:inline-block;background:var(--gradient-btn);color:white;text-decoration:none;padding:14px 48px;border-radius:24px;font-size:17px;font-weight:600;border:1px solid var(--gold);transition:all 0.3s;box-shadow:0 0 30px rgba(124,58,237,0.25)}
.enter-btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(124,58,237,0.4);opacity:0.95}
.features{display:flex;gap:20px;margin-top:50px;flex-wrap:wrap;justify-content:center}
.feature-item{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 18px;width:140px;backdrop-filter:blur(12px);transition:transform 0.2s}
.feature-item:hover{transform:translateY(-3px)}
.feature-icon{font-size:28px;margin-bottom:8px}
.feature-label{font-size:12px;color:var(--text-secondary)}
</style>
</head>
<body>
<div class="container">
  <h1>B端思维·进阶工作台</h1>
  <p class="subtitle">每日5分钟，从"高级"迈向"资深"</p>
  <a href="./btoa-workbench.html" class="enter-btn">🚀 进入工作台</a>
  <div class="features">
    <div class="feature-item"><div class="feature-icon">📰</div><div class="feature-label">每日视野</div></div>
    <div class="feature-item"><div class="feature-icon">🔧</div><div class="feature-label">ToB武器库</div></div>
    <div class="feature-item"><div class="feature-icon">📖</div><div class="feature-label">每日一课</div></div>
    <div class="feature-item"><div class="feature-icon">🔥</div><div class="feature-label">灵感火花</div></div>
  </div>
</div>
</body>
</html>
